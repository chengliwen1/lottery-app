name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf \
            libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev automake
    
    - name: Pre-install Android SDK
      run: |
        mkdir -p ~/.buildozer/android/platform/android-sdk/cmdline-tools
        cd ~/.buildozer/android/platform/android-sdk/cmdline-tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip -q commandlinetools-linux-9477386_latest.zip
        mv cmdline-tools latest
        
        # 创建 tools 软链接（buildozer 期望的路径）
        cd ~/.buildozer/android/platform/android-sdk
        mkdir -p tools
        ln -s ../cmdline-tools/latest/bin tools/bin
        
        # 接受 license 并安装组件
        yes | tools/bin/sdkmanager --licenses
        tools/bin/sdkmanager "platform-tools" "build-tools;33.0.0" "platforms;android-33"
    
    - name: Install buildozer
      run: |
        pip install buildozer cython
    
    - name: Build APK
      run: |
        buildozer android debug
      timeout-minutes: 120
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: lottery-app-apk
        path: bin/*.apk
