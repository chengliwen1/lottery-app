name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf \
            libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev automake
    
    - name: Install buildozer
      run: |
        pip install buildozer cython
    
    - name: Pre-install Android SDK with Java 17 compatible tools
      run: |
        # 下载新版 cmdline-tools (支持 Java 17)
        mkdir -p /tmp/android-sdk/cmdline-tools
        cd /tmp/android-sdk/cmdline-tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-11076708_latest.zip
        mv cmdline-tools latest
        
        # 接受 license
        yes | latest/bin/sdkmanager --sdk_root=/tmp/android-sdk --licenses
        
        # 安装组件
        latest/bin/sdkmanager --sdk_root=/tmp/android-sdk "platform-tools" "build-tools;33.0.0" "platforms;android-33"
        
        # 复制到 buildozer 目录
        mkdir -p ~/.buildozer/android/platform/android-sdk
        cp -r /tmp/android-sdk/* ~/.buildozer/android/platform/android-sdk/
        
        # 创建 tools 软链接
        cd ~/.buildozer/android/platform/android-sdk
        mkdir -p tools
        ln -s ../cmdline-tools/latest/bin tools/bin
    
    - name: Build APK
      run: |
        buildozer android debug
      timeout-minutes: 120
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: lottery-app-apk
        path: bin/*.apk
